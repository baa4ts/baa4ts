<!DOCTYPE html>
<html lang="es" data-scheme="light">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BAA4TS</title>

  <!-- Preload y carga de CSS -->
  <link rel="preload" as="style" href="src/css/index.css" />
  <link rel="stylesheet" href="src/css/reset.css" media="print" onload="this.media='all'" />
  <link rel="stylesheet" href="src/css/index.css" />

  <!-- Eliminación temprana de .no-js -->
  <script>
    document.documentElement.classList.remove('no-js');
  </script>

  <!-- JavaScript no bloqueante -->
  <script src="src/js/load.js" async></script>
  <link rel="modulepreload" href="src/js/index.js" />
  <script type="module" defer src="src/js/index.js"></script>
</head>

<body>
  <main>
    <section class="control__tema">

        <span class="control__tema__button_dib"></span>
      </button>
    </section>

    <section class="hero">
      <div class="hero__borde">
        <h1 class="hero__titulo">
          <span class="hero__grupo">BA</span>
          <span class="hero__grupo">A4</span>
          <span class="hero__grupo">TS</span>
        </h1>

      </div>
      <div id="ScrollMenu" class="hero__scrooll__button">
        <h2>↓</h2>
      </div>
    </section>

    <section id="Menu" class="menu">
      <h1 class="Menu__title">Menu</h1>
      <div class="menu__sub">
        <div id="SobreMi" class="menu__sub__opcion">Sobre Mi</div>
        <div id="Proyectos" class="menu__sub__opcion">Proyectos</div>
        <div id="Habilidades" class="menu__sub__opcion">Habilidades</div>
        <div id="Contacto" class="menu__sub__opcion">Contacto</div>
      </div>
    </section>
  </main>
</body>

</html>
